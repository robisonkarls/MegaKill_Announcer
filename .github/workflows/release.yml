name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.7) — must match an existing git tag vX.Y.Z'
        required: true
      deploy_curseforge:
        description: 'Deploy to CurseForge'
        type: boolean
        default: true
      deploy_wago:
        description: 'Deploy to Wago Addons'
        type: boolean
        default: true
      deploy_github:
        description: 'Create GitHub Release'
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Checkout the exact tag so packager sees a clean version tag (= Stable)
          ref: v${{ github.event.inputs.version }}

      - name: Package and Upload
        uses: BigWigsMods/packager@master
        env:
          CF_API_KEY: ${{ github.event.inputs.deploy_curseforge == 'true' && secrets.CF_API_TOKEN || '' }}
          WAGO_API_TOKEN: ${{ github.event.inputs.deploy_wago == 'true' && secrets.WAGO_API_TOKEN || '' }}
          GITHUB_OAUTH: ${{ github.event.inputs.deploy_github == 'true' && secrets.GITHUB_TOKEN || '' }}
